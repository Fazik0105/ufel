<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFEL Champions Hall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #050505; /* Outer dark background */
        }
        /* Custom scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background-color: #404040;
            border-radius: 20px;
        }
        .backdrop-enter {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .backdrop-active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-enter {
            transform: translateY(100%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-active {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="flex justify-center min-h-screen text-neutral-200">

    <!-- Mobile Container Simulation -->
    <div class="w-full max-w-[430px] bg-black min-h-screen shadow-2xl border-x border-neutral-900 flex flex-col relative overflow-hidden">

        <!-- Navigation -->
        <nav class="w-full border-b border-neutral-900 py-5 px-6 flex items-center justify-between sticky top-0 bg-black/80 backdrop-blur-xl z-30">
            <div class="font-semibold tracking-tighter text-lg flex items-center gap-2 text-white">
                <span class="bg-white text-black text-xs px-2 py-0.5 rounded-sm font-bold">UFEL</span>
                <span class="text-neutral-500 tracking-tight">LEAGUE</span>
            </div>
            <div class="w-8 h-8 rounded-full bg-neutral-900 border border-neutral-800 flex items-center justify-center text-white">
                 <iconify-icon icon="solar:hamburger-menu-linear" width="18"></iconify-icon>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-grow flex flex-col px-5 pt-8 pb-24 overflow-y-auto custom-scroll">
            
            <!-- Header -->
            <div class="mb-10">
                <div class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-neutral-900 border border-neutral-800 text-[10px] font-medium text-neutral-400 uppercase tracking-widest mb-4">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Season 04
                </div>
                <h1 class="text-3xl font-semibold tracking-tighter text-white mb-3">Champions Hall</h1>
                <p class="text-neutral-500 text-sm font-light leading-relaxed">
                    Legends of the virtual pitch. Tap a player to view their complete trophy history.
                </p>
            </div>

            <!-- Grid of Cards -->
            <div class="flex flex-col gap-4 w-full" id="cards-container">
                <!-- Cards injected via JS -->
            </div>

        </main>

        <!-- Bottom Tab Bar (Mobile specific) -->
        <div class="sticky bottom-0 w-full bg-black/90 backdrop-blur-md border-t border-neutral-900 py-3 px-6 flex justify-between items-center z-20 text-[10px] font-medium text-neutral-500">
            <div class="flex flex-col items-center gap-1 text-white">
                <iconify-icon icon="solar:cup-star-bold" width="22"></iconify-icon>
                <span>Hall</span>
            </div>
            <div class="flex flex-col items-center gap-1 hover:text-neutral-300 transition-colors">
                <iconify-icon icon="solar:calendar-linear" width="22"></iconify-icon>
                <span>Schedule</span>
            </div>
            <div class="flex flex-col items-center gap-1 hover:text-neutral-300 transition-colors">
                <iconify-icon icon="solar:chart-square-linear" width="22"></iconify-icon>
                <span>Stats</span>
            </div>
            <div class="flex flex-col items-center gap-1 hover:text-neutral-300 transition-colors">
                <iconify-icon icon="solar:user-circle-linear" width="22"></iconify-icon>
                <span>Profile</span>
            </div>
        </div>

        <!-- Modal Overlay -->
        <div id="modal-backdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm z-40 backdrop-enter flex items-end justify-center hidden">
            
            <!-- Modal Window (Bottom Sheet style) -->
            <div id="modal-window" class="bg-neutral-900 w-full rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-neutral-800 overflow-hidden modal-enter flex flex-col max-h-[80vh]">
                
                <!-- Handle -->
                <div class="w-full flex justify-center pt-3 pb-1" onclick="closeModal()">
                    <div class="w-12 h-1.5 bg-neutral-800 rounded-full"></div>
                </div>

                <!-- Modal Header -->
                <div class="px-6 py-4 flex items-center justify-between shrink-0">
                    <div>
                        <h2 id="modal-player-name" class="text-xl font-semibold tracking-tight text-white">Player Name</h2>
                        <p class="text-xs text-neutral-500 mt-1 font-medium uppercase tracking-wider">Career Statistics</p>
                    </div>
                    <button onclick="closeModal()" class="text-neutral-500 hover:text-white bg-neutral-800/50 hover:bg-neutral-800 p-2 rounded-full transition-colors focus:outline-none">
                        <iconify-icon icon="solar:close-circle-linear" width="24" height="24"></iconify-icon>
                    </button>
                </div>

                <!-- Modal Content (Scrollable) -->
                <div class="overflow-y-auto custom-scroll p-4">
                    <div id="modal-history-list" class="flex flex-col gap-2">
                        <!-- History items injected via JS -->
                    </div>
                </div>

                <!-- Modal Footer -->
                <div class="px-6 py-6 bg-black/20 text-center shrink-0 mb-4">
                    <p class="text-xs text-neutral-500 uppercase tracking-widest font-medium">Total Trophies</p>
                    <p id="modal-total-wins" class="text-3xl font-semibold text-white tracking-tight mt-1">0</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Data Structure
        const players = [
            {
                id: 1,
                name: "SAID",
                handle: "@said_1114",
                wins: 5,
                history: [
                    { tournament: "WORLD CUP", year: "December 15, 2023", rank: 1 },
                    { tournament: "SERIE A", year: "April 28, 2025", rank: 1 },
                    { tournament: "UFEL CUP 2025", year: "June 30, 2022", rank: 2 },
                    { tournament: "WINTER OPEN", year: "September 3, 2019", rank: 1 },
                    { tournament: "LA LIGA", year: "October 19, 2024", rank: 3 }
                ]
            },
            {
                id: 2,
                name: "Sarah 'Valkyrie'",
                handle: "@valkyrie_ef",
                wins: 3,
                history: [
                    { tournament: "Summer Invitational", year: "2023", rank: 1 },
                    { tournament: "UFEL Pro League", year: "2023", rank: 2 },
                    { tournament: "Global Masters", year: "2022", rank: 1 },
                    { tournament: "Spring Major", year: "2022", rank: 1 }
                ]
            },
            {
                id: 3,
                name: "Davide 'Catenaccio'",
                handle: "@db_defend",
                wins: 4,
                history: [
                    { tournament: "European Cup", year: "2024", rank: 1 },
                    { tournament: "Winter Open", year: "2023", rank: 2 },
                    { tournament: "Club Championship", year: "2023", rank: 1 },
                    { tournament: "UFEL Super Cup", year: "2022", rank: 1 },
                    { tournament: "National Qualifiers", year: "2021", rank: 1 }
                ]
            },
            {
                id: 4,
                name: "Yuto 'Striker' N.",
                handle: "@yuto_goal",
                wins: 2,
                history: [
                    { tournament: "Asian Pacific Cup", year: "2023", rank: 1 },
                    { tournament: "Global Masters", year: "2023", rank: 3 },
                    { tournament: "Rookie Showcase", year: "2022", rank: 1 }
                ]
            },
            {
                id: 5,
                name: "Marcus 'Prime' J.",
                handle: "@prime_time",
                wins: 6,
                history: [
                    { tournament: "Grand Finals", year: "2024", rank: 1 },
                    { tournament: "Summer Major", year: "2023", rank: 1 },
                    { tournament: "Winter Major", year: "2023", rank: 1 },
                    { tournament: "Pre-Season Cup", year: "2022", rank: 2 },
                    { tournament: "Regional Open", year: "2022", rank: 1 },
                    { tournament: "Academy League", year: "2021", rank: 1 }
                ]
            },
            {
                id: 6,
                name: "Elena 'Control' V.",
                handle: "@elena_v",
                wins: 3,
                history: [
                    { tournament: "South American Cup", year: "2023", rank: 1 },
                    { tournament: "Intercontinental", year: "2023", rank: 2 },
                    { tournament: "Spring Open", year: "2022", rank: 1 },
                    { tournament: "Debutante Cup", year: "2021", rank: 1 }
                ]
            }
        ];

        // Helper to get rank styling (Dark Mode)
        const getRankStyle = (rank) => {
            if (rank === 1) return { 
                icon: 'solar:cup-star-linear', 
                colorClass: 'text-amber-400', 
                bgClass: 'bg-amber-400/10 border-amber-400/20',
                label: 'Champion'
            };
            if (rank === 2) return { 
                icon: 'solar:medal-star-linear', 
                colorClass: 'text-neutral-300', 
                bgClass: 'bg-white/5 border-white/10',
                label: 'Runner-up'
            };
            if (rank === 3) return { 
                icon: 'solar:medal-ribbon-star-linear', 
                colorClass: 'text-orange-400', 
                bgClass: 'bg-orange-400/10 border-orange-400/20',
                label: '3rd Place'
            };
            return { icon: 'solar:cup-linear', colorClass: 'text-neutral-500', bgClass: 'bg-neutral-800', label: 'Participant' };
        };

        // Render Cards (List view for mobile)
        const renderCards = () => {
            const container = document.getElementById('cards-container');
            container.innerHTML = players.map(player => `
                <div onclick="openModal(${player.id})" class="group bg-neutral-900 border border-neutral-800 rounded-2xl p-4 cursor-pointer active:scale-95 transition-all duration-200 ease-out flex items-center justify-between relative overflow-hidden">
                    <div class="flex items-center gap-4 relative z-10">
                        <div class="w-12 h-12 rounded-full bg-neutral-800 text-neutral-300 border border-neutral-700 flex items-center justify-center font-semibold text-sm">
                            ${player.name.charAt(0)}
                        </div>
                        <div>
                            <h3 class="font-semibold text-base tracking-tight text-white group-hover:text-neutral-200">${player.name}</h3>
                            <p class="text-xs text-neutral-500 font-medium">${player.handle}</p>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-1.5 text-xs font-medium text-neutral-400 bg-neutral-800/50 px-2.5 py-1.5 rounded-lg border border-neutral-700/50">
                        <iconify-icon icon="solar:cup-linear" class="text-neutral-500"></iconify-icon>
                        <span class="text-white">${player.wins}</span>
                    </div>
                </div>
            `).join('');
        };

        // Modal Logic
        const backdrop = document.getElementById('modal-backdrop');
        const modalWindow = document.getElementById('modal-window');

        window.openModal = (id) => {
            const player = players.find(p => p.id === id);
            if (!player) return;

            document.getElementById('modal-player-name').textContent = player.name;
            document.getElementById('modal-total-wins').textContent = player.wins;

            const historyList = document.getElementById('modal-history-list');
            historyList.innerHTML = player.history.map(item => {
                const style = getRankStyle(item.rank);
                return `
                    <div class="flex items-center justify-between p-3.5 rounded-xl bg-neutral-800/40 border border-transparent hover:border-neutral-700 transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center border shrink-0 ${style.bgClass} ${style.colorClass}">
                                <iconify-icon icon="${style.icon}" width="16" height="16" stroke-width="1.5"></iconify-icon>
                            </div>
                            <div>
                                <h4 class="text-sm font-medium text-neutral-200 leading-tight">${item.tournament}</h4>
                                <span class="text-[10px] text-neutral-500 inline-block mt-0.5">${item.year}</span>
                            </div>
                        </div>
                        <div class="text-[10px] font-semibold px-2 py-1 rounded-md border ${style.bgClass} ${style.colorClass}">
                            ${style.label}
                        </div>
                    </div>
                `;
            }).join('');

            backdrop.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.add('backdrop-active');
                modalWindow.classList.add('modal-active');
            }, 10);
        };

        window.closeModal = () => {
            backdrop.classList.remove('backdrop-active');
            modalWindow.classList.remove('modal-active');
            
            setTimeout(() => {
                backdrop.classList.add('hidden');
            }, 400);
        };

        backdrop.addEventListener('click', (e) => {
            if (e.target === backdrop) closeModal();
        });

        renderCards();

    </script>

</body></html>
