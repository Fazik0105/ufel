{% load static %} {% for row in table %}
<tr class="table-row">
    <td class="col-rank">
        <span class="rank-badge rank-{{ forloop.counter }}">
            {{ forloop.counter }}
        </span>
    </td>
    <td class="col-player">
        <div class="player-info">
            <div class="avatar-wrapper">
                <img src="{% if row.user.avatar %}{{ row.user.avatar.url }}{% else %}{% static 'images/UFEL.png' %}{% endif %}" alt="Avatar">
            </div>
            <div class="name-box">
                <span class="full-name">{{ row.user.first_name }} {{ row.user.last_name }}</span>
                <span class="username">@{{ row.user.username }}</span>
            </div>
        </div>
    </td>
    <td class="col-stat"><strong>{{ row.pld }}</strong></td>
    <td class="col-stat">
        <span class="gd-tag {% if row.gd > 0 %}plus{% elif row.gd < 0 %}minus{% endif %}">
            {{ row.gd|default:"0" }}
        </span>
    </td>
    <td class="col-stat highlight">
        <span class="pts-badge">{{ row.pts }}</span>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="5" style="text-align: center; padding: 20px; color: white;">Hozircha ma'lumotlar yo'q</td>
</tr>
{% endfor %}
