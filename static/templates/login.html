{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFEL | Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body.login-page {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1a1a2e, #000);
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        /* NAVBAR */
        .panel {
            padding: 15px 40px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 15px rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-link {
            color: #22d3ee;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #7c3aed;
            transform: translateX(-3px);
        }

        .navbar a {
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #22d3ee;
        }

        /* WRAPPER */
        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD */
        .login-card {
            width: 380px;
            padding: 35px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow:
                0 0 40px rgba(124, 58, 237, 0.25),
                inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            animation: fadeInUp 0.8s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header img {
            width: 70px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(124, 58, 237, 0.6));
        }

        .login-header h2 {
            font-size: 22px;
            letter-spacing: 3px;
            margin: 0;
        }

        .login-line {
            width: 60px;
            height: 3px;
            margin: 12px auto 0;
            background: linear-gradient(90deg, #7c3aed, #22d3ee);
            border-radius: 10px;
        }

        /* FORM */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 13px;
            color: #cbd5f5;
        }

        .input-group input {
            padding: 12px 14px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: #94a3b8;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.6);
        }

        /* BUTTON */
        .login-btn-submit {
            margin-top: 10px;
            padding: 14px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            color: #fff;
            background: linear-gradient(135deg, #7c3aed, #22d3ee);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.45);
            transition: all 0.3s ease;
        }

        .login-btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(34, 211, 238, 0.55);
        }

        .login-btn-submit:active {
            transform: scale(0.98);
        }

        /* MESSAGES */
        .login-messages {
            margin-top: 18px;
            text-align: center;
        }

        .login-messages .error {
            color: #f87171;
        }

        .login-messages .success {
            color: #4ade80;
        }

        /* ANIMATION */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 420px) {
            .login-card {
                width: 90%;
            }
        }
    </style>
</head>

<body class="login-page">
    <header class="panel">
        <a href="{% url 'index' %}" class="back-link">← Asosiy sahifa</a>
        <nav class="navbar">
            <a href="{% url 'index' %}">UFEL</a>
        </nav>
    </header>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="{% static 'images/UFEL.png' %}" alt="Logo">
                <h2>ADMIN LOGIN</h2>
                <div class="login-line"></div>
            </div>

            <form method="POST" class="login-form">
                {% csrf_token %}
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Username kiriting" required>
                </div>
                
                <div class="input-group">
                    <label>Parol</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn-submit">KIRISH</button>
            </form>

            {% if messages %}
                <div class="login-messages">
                    {% for message in messages %}
                        <p class="{{ message.tags }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
